services:
  - type: web
    name: cheating-detector-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn cheating_detector.api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*"
